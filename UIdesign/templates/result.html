{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Result</title>
    <!-- Mobile Specific Metas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <!-- Font-->
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'predictheart/css/nunito-font.css' %}"
    />
    <!-- Main Style Css -->
    <link rel="stylesheet" href="{% static 'predictheart/css/style5.css' %}" />

    <!-- nav CSS Files -->
    <link href="{% static 'assets/vendor/aos' %}" rel="stylesheet" />
    <link
      href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css'  %}"
      rel="stylesheet"
    />
    <link
      href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css'  %}"
      rel="stylesheet"
    />
    <link
      href="{% static 'assets/vendor/boxicons/css/boxicons.min.css'  %}"
      rel="stylesheet"
    />
    <link
      href="{% static 'assets/vendor/glightbox/css/glightbox.min.'  %}"
      rel="stylesheet"
    />
    <link
      href="{% static 'assets/vendor/swiper/swiper-bundle.min.css'  %}"
      rel="stylesheet"
    />

    <!-- Template Main CSS File -->
    <link href="{% static 'assets/css/style.css'  %}" rel="stylesheet" />
  </head>
  <body class="form-v9">
    <header id="header" class="fixed-top d-flex align-items-center">
      <div class="container d-flex align-items-center justify-content-between">
        <div class="logo">
          <h1 class="text-light">
            <a href="/home"><span>Health Bot</span></a>
          </h1>
          <!-- <a href="index.html"><img src="assets/img/logo.png" alt="" class="img-fluid"></a>-->
        </div>

        <nav id="navbar" class="navbar">
          <ul>
            <li><a class="nav-link scrollto" href="/home">Home</a></li>
            <li>
              <a class="nav-link scrollto" href="/services">Services</a>
            </li>
            <li><a class="nav-link scrollto" href="/home/#team">Team</a></li>
            <li>
              <a class="nav-link scrollto" href="/home/#about">About Us</a>
            </li>
            <li>
              <a class="nav-link scrollto" href="/home/#contact">Contact</a>
            </li>
            <li>
              {% if request.user.is_authenticated %}
              <a class="getstarted scrollto" href="/logout">Logout</a>
              {% else %}
              <a class="getstarted scrollto" href="/login">Login</a>
              {% endif %}
            </li>
          </ul>
          <i class="bi bi-list mobile-nav-toggle"></i>
        </nav>
        <!-- .navbar -->
      </div>
    </header>
    <div class="page-content">
      <div class="form-v9-content" style="background-color: #eecda9">
        <h2 class="result">{{ans}}</h2>
      </div>
    </div>
  </body>
</html>
